<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LifeLine 108+ — Driver App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:    #dc2626;
            --navy:   #0f172a;
            --muted:  #64748b;
            --border: #e2e8f0;
            --bg:     #f8fafc;
            --white:  #ffffff;
            --green:  #16a34a;
            --blue:   #2563eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--navy);
            background: #0f172a;
        }

        /* ───── TOAST ───── */
        #toast-container {
            position: fixed; top: 16px; right: 16px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }
        .toast {
            display: flex; align-items: flex-start; gap: 10px;
            background: #1e293b; color: #f1f5f9;
            border-radius: 10px; padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,.4);
            font-size: 13px; font-weight: 500;
            max-width: 320px; pointer-events: auto;
            animation: toastIn .25s ease-out;
            border-left: 3px solid var(--blue);
        }
        .toast.error  { border-left-color: var(--red); }
        .toast.success{ border-left-color: var(--green); }
        .toast.warning{ border-left-color: #f59e0b; }
        .toast i { margin-top: 1px; flex-shrink: 0; }
        @keyframes toastIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }

        /* ───── LOGIN SCREEN ───── */
        #loginScreen {
            min-height: 100vh;
            background: linear-gradient(160deg, #0f172a 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px 60px;
            overflow-y: auto;
        }

        .brand {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 54px; height: 54px;
            background: var(--red);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff;
            flex-shrink: 0;
        }
        .brand-name { font-size: 26px; font-weight: 800; color: #fff; line-height: 1.1; }
        .brand-sub  { font-size: 13px; color: #64748b; font-weight: 500; }

        .login-card {
            width: 100%; max-width: 460px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(0,0,0,.4);
            overflow: hidden;
        }

        .card-sec {
            padding: 28px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }
        .card-sec:last-child { border-bottom: none; }

        .sec-title {
            font-size: 16px; font-weight: 700; color: #0f172a;
            display: flex; align-items: center; gap: 9px;
            margin-bottom: 20px;
        }
        .sec-title i { color: var(--red); font-size: 15px; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; margin-bottom: 6px;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .6px;
            color: #64748b;
        }
        .form-group input {
            width: 100%; padding: 11px 14px;
            background: #ffffff;
            border: 1.5px solid #cbd5e1;
            border-radius: 9px;
            font-family: 'Inter', sans-serif; font-size: 14px; color: #0f172a;
            outline: none;
            transition: border-color .18s, box-shadow .18s;
        }
        .form-group input::placeholder { color: #94a3b8; }
        .form-group input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37,99,235,.12);
        }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px 18px;
            border: none; border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all .18s; text-decoration: none;
        }
        .btn-blue  { background: #2563eb; color: #fff; }
        .btn-blue:hover:not(:disabled)  { background: #1d4ed8; }
        .btn-green { background: #16a34a; color: #fff; margin-top: 4px; }
        .btn-green:hover:not(:disabled) { background: #15803d; }
        .btn:disabled {
            background: #e2e8f0 !important; color: #94a3b8 !important;
            cursor: not-allowed; box-shadow: none !important;
        }

        .back-link {
            margin-top: 24px; color: #475569; font-size: 13px;
            text-decoration: none; display: flex; align-items: center; gap: 7px;
            transition: color .2s;
        }
        .back-link:hover { color: #f1f5f9; }

        /* ───── APP SCREEN ───── */
        #appScreen {
            display: none;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .app-header {
            background: #0f172a;
            padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
            z-index: 500;
            gap: 8px;
        }
        .app-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .app-logo {
            width: 36px; height: 36px; flex-shrink: 0;
            background: var(--red); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: #fff;
        }
        .app-title  { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; }
        .driver-sub { font-size: 11px; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-header-right {
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }

        .status-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 11px; border-radius: 20px;
            font-size: 12px; font-weight: 700; white-space: nowrap;
        }
        .status-pill.available { background: rgba(34,197,94,.15); color: #22c55e; }
        .status-pill.on-duty   { background: rgba(220,38,38,.15);  color: #f87171; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

        .conn-badge {
            font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px;
            white-space: nowrap;
        }
        .conn-badge.online  { background: rgba(34,197,94,.15); color: #22c55e; }
        .conn-badge.offline { background: rgba(220,38,38,.15);  color: #f87171; }

        .logout-btn {
            padding: 6px 10px;
            background: rgba(255,255,255,.07);
            color: #94a3b8; border: none; border-radius: 7px;
            font-size: 13px; cursor: pointer; transition: all .18s;
        }
        .logout-btn:hover { background: rgba(220,38,38,.25); color: #fff; }

        /* map */
        .map-area { flex: 1; position: relative; overflow: hidden; }
        #map { width: 100%; height: 100%; }

        /* emergency overlay */
        .emerg-overlay {
            position: absolute; top: 12px; left: 12px; right: 12px;
            background: rgba(185,28,28,.97);
            backdrop-filter: blur(10px);
            border-radius: 14px; padding: 16px; z-index: 1000;
            display: none;
            box-shadow: 0 8px 32px rgba(185,28,28,.5);
            animation: slideDown .3s ease-out;
        }
        .emerg-overlay.show { display: block; }
        @keyframes slideDown {
            from { opacity:0; transform:translateY(-12px); }
            to   { opacity:1; transform:none; }
        }

        .emerg-head {
            font-size: 15px; font-weight: 800; color: #fff;
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
        }
        .emerg-head i { animation: shake .45s ease-in-out infinite alternate; font-size: 17px; }
        @keyframes shake {
            from { transform: rotate(-10deg); }
            to   { transform: rotate(10deg); }
        }

        .emerg-body {
            background: rgba(0,0,0,.22);
            border-radius: 10px; padding: 12px; margin-bottom: 14px;
        }
        .emerg-body p {
            font-size: 13px; color: rgba(255,255,255,.9);
            margin-bottom: 5px; line-height: 1.45;
        }
        .emerg-body p:last-child { margin-bottom: 0; }
        .emerg-body strong { color: #fff; }

        .emerg-btns {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
        }
        .emerg-btn {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            padding: 10px 6px; border: none; border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: filter .18s;
        }
        .emerg-btn i { font-size: 16px; }
        .emerg-btn.nav    { background: #2563eb; color: #fff; }
        .emerg-btn.arrive { background: #16a34a; color: #fff; }
        .emerg-btn.done   { background: rgba(255,255,255,.18); color: #fff; border: 1px solid rgba(255,255,255,.25); }
        .emerg-btn:hover:not(:disabled)  { filter: brightness(1.12); }
        .emerg-btn:disabled { opacity: .45; cursor: not-allowed; filter: none; }

        /* route info */
        .route-info {
            position: absolute; bottom: 68px; left: 12px;
            background: rgba(255,255,255,.96); backdrop-filter: blur(8px);
            border-radius: 10px; padding: 10px 14px;
            z-index: 1000; display: none;
            box-shadow: 0 2px 12px rgba(15,23,42,.14);
            font-size: 12px; color: #0f172a;
        }
        .route-info.show { display: block; }
        .route-info div { margin-bottom: 3px; }
        .route-info div:last-child { margin-bottom: 0; }

        /* ── HOSPITAL MODE OVERLAY ── */
        .hosp-overlay {
            position: absolute; top: 12px; left: 12px; right: 12px;
            background: linear-gradient(135deg, #065f46 0%, #047857 100%);
            backdrop-filter: blur(12px);
            border-radius: 14px; padding: 16px; z-index: 1001;
            display: none;
            box-shadow: 0 8px 32px rgba(4,120,87,.55);
            animation: slideDown .35s cubic-bezier(.4,0,.2,1);
        }
        .hosp-overlay.show { display: block; }
        .hosp-head {
            font-size: 13px; font-weight: 800; color: #6ee7b7;
            text-transform: uppercase; letter-spacing: .6px;
            display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
        }
        .hosp-head i { font-size: 15px; }
        .hosp-name {
            font-size: 17px; font-weight: 800; color: #fff;
            margin-bottom: 2px; line-height: 1.25;
        }
        .hosp-addr {
            font-size: 12px; color: rgba(255,255,255,.65);
            margin-bottom: 12px;
        }
        .hosp-stats {
            display: flex; gap: 10px; margin-bottom: 14px;
        }
        .hosp-stat {
            background: rgba(0,0,0,.22); border-radius: 9px;
            padding: 8px 12px; flex: 1; text-align: center;
        }
        .hosp-stat-val { font-size: 16px; font-weight: 800; color: #fff; }
        .hosp-stat-lbl { font-size: 10px; color: rgba(255,255,255,.55); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 1px; }
        .hosp-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .hosp-btn {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            padding: 11px 6px; border: none; border-radius: 10px;
            font-family: 'Inter',sans-serif; font-size: 11px; font-weight: 700;
            cursor: pointer; transition: filter .18s;
        }
        .hosp-btn i { font-size: 16px; }
        .hosp-btn.nav-h  { background: #2563eb; color: #fff; }
        .hosp-btn.nav-v  { background: #d97706; color: #fff; }
        .hosp-btn.done-h { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25); }
        .hosp-btn:hover  { filter: brightness(1.12); }
        .hosp-searching {
            text-align: center; padding: 12px 0;
            font-size: 13px; color: rgba(255,255,255,.8);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* fabs */
        .fab-group {
            position: absolute; bottom: 68px; right: 12px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .fab {
            width: 46px; height: 46px; border-radius: 50%;
            border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 17px; color: #fff;
            box-shadow: 0 4px 14px rgba(15,23,42,.25); transition: all .18s;
        }
        .fab:hover { transform: scale(1.08); }
        .fab-center { background: #1e293b; }
        .fab-route  { background: var(--blue); display: none; }

        /* status bar */
        .status-bar {
            background: #fff; border-top: 1px solid #e2e8f0;
            padding: 9px 16px; font-size: 12px; color: #64748b;
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .status-bar i { color: #22c55e; }

        /* responsive tweaks */
        @media (max-width: 480px) {
            .app-title { font-size: 13px; }
            .status-pill span { display: none; }
            .conn-badge { display: none; }
            .emerg-btns { grid-template-columns: 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="loginScreen">
    <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-truck-medical"></i></div>
        <div>
            <div class="brand-name">LifeLine 108+</div>
            <div class="brand-sub">Ambulance Driver Portal</div>
        </div>
    </div>

    <div class="login-card">
        <!-- Login -->
        <div class="card-sec">
            <div class="sec-title"><i class="fa-solid fa-right-to-bracket"></i> Driver Login</div>
            <div class="form-group">
                <label>Ambulance ID</label>
                <input type="text" id="ambulanceId" placeholder="e.g. AMB-001 or &quot;demo&quot;">
            </div>
            <button class="btn btn-blue" id="loginBtn">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </div>

        <!-- Register -->
        <div class="card-sec">
            <div class="sec-title"><i class="fa-solid fa-user-plus"></i> Register New Ambulance</div>
            <div class="form-group">
                <label>Ambulance ID</label>
                <input type="text" id="newAmbulanceId" placeholder="Enter ambulance ID">
            </div>
            <div class="form-group">
                <label>Driver Name</label>
                <input type="text" id="driverName" placeholder="Enter driver name">
            </div>
            <div class="form-group">
                <label>Driver Phone</label>
                <input type="tel" id="driverPhone" placeholder="+919876543210">
            </div>
            <button class="btn btn-green" id="registerBtn">
                <i class="fa-solid fa-circle-plus"></i> Register Ambulance
            </button>
        </div>
    </div>

    <a class="back-link" href="/"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
</div>

<!-- ═══ APP SCREEN ═══ -->
<div id="appScreen">
    <div class="app-header">
        <div class="app-header-left">
            <div class="app-logo"><i class="fa-solid fa-truck-medical"></i></div>
            <div>
                <div class="app-title">LifeLine 108+</div>
                <div class="driver-sub" id="driverInfo">Loading…</div>
            </div>
        </div>
        <div class="app-header-right">
            <div class="status-pill available" id="statusPill">
                <div class="status-dot"></div>
                <span id="statusText">Available</span>
            </div>
            <span class="conn-badge online" id="connectionStatus">Online</span>
            <button class="logout-btn" id="logoutBtn" title="Logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </div>

    <div class="map-area">
        <div id="map"></div>

        <div class="emerg-overlay" id="emergencyAlert">
            <div class="emerg-head">
                <i class="fa-solid fa-siren-on"></i> EMERGENCY ALERT
            </div>
            <div class="emerg-body" id="emergencyDetails"></div>
            <div class="emerg-btns">
                <button class="emerg-btn nav"    id="navigateBtn" onclick="openVictimGoogleMaps()"><i class="fa-brands fa-google"></i>Open in Maps</button>
                <button class="emerg-btn arrive" id="arrivedBtn"> <i class="fa-solid fa-location-check"></i>Arrived</button>
                <button class="emerg-btn done"   id="completeBtn"><i class="fa-solid fa-flag-checkered"></i>Complete</button>
            </div>
        </div>

        <!-- ── HOSPITAL MODE OVERLAY ── -->
        <div class="hosp-overlay" id="hospitalOverlay">
            <div class="hosp-head"><i class="fa-solid fa-hospital"></i> Nearest Hospital</div>
            <div id="hospContent">
                <div class="hosp-searching">
                    <i class="fa-solid fa-spinner fa-spin"></i> Searching for nearest hospital…
                </div>
            </div>
        </div>

        <div class="route-info" id="routeInfo">
            <div><strong>Distance:</strong> <span id="routeDistance">—</span></div>
            <div><strong>ETA:</strong> <span id="routeETA">—</span></div>
        </div>

        <div class="fab-group">
            <button class="fab fab-route"  id="toggleRouteBtn" title="Toggle route"><i class="fa-solid fa-route"></i></button>
            <button class="fab fab-center" id="recenterBtn"    title="Re-centre"><i class="fa-solid fa-location-crosshairs"></i></button>
        </div>
    </div>

    <div class="status-bar">
        <i class="fa-solid fa-satellite-dish"></i>
        <span id="locationStatus">Waiting for GPS…</span>
    </div>
</div>

<audio id="notificationSound" preload="auto">
    <source src="https://www.soundjay.com/buttons/sounds/beep-08b.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.min.js"></script>
<script>
/* ── Toast helper ── */
function toast(msg, type='info', duration=4000) {
    const icons = {info:'fa-circle-info', error:'fa-circle-xmark', success:'fa-circle-check', warning:'fa-triangle-exclamation'};
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.innerHTML = `<i class="fa-solid ${icons[type]||icons.info}"></i><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), duration);
}

/* ── DOM refs ── */
const loginScreen    = document.getElementById('loginScreen');
const appScreen      = document.getElementById('appScreen');
const ambulanceIdInp = document.getElementById('ambulanceId');
const loginBtn       = document.getElementById('loginBtn');
const logoutBtn      = document.getElementById('logoutBtn');
const newAmbIdInp    = document.getElementById('newAmbulanceId');
const driverNameInp  = document.getElementById('driverName');
const driverPhoneInp = document.getElementById('driverPhone');
const registerBtn    = document.getElementById('registerBtn');
const driverInfo     = document.getElementById('driverInfo');
const statusPill     = document.getElementById('statusPill');
const statusText     = document.getElementById('statusText');
const emergencyAlert = document.getElementById('emergencyAlert');
const emergencyDet   = document.getElementById('emergencyDetails');
const navigateBtn    = document.getElementById('navigateBtn');
const arrivedBtn     = document.getElementById('arrivedBtn');
const completeBtn    = document.getElementById('completeBtn');
const recenterBtn    = document.getElementById('recenterBtn');
const toggleRouteBtn = document.getElementById('toggleRouteBtn');
const locationStatus = document.getElementById('locationStatus');
const routeInfo      = document.getElementById('routeInfo');
const routeDistance  = document.getElementById('routeDistance');
const routeETA       = document.getElementById('routeETA');
const connStatus     = document.getElementById('connectionStatus');

let map=null, userMarker=null, destMarker=null, routePoly=null, hospitalMarker=null, hospitalPoly=null;
let watchId=null, currentPos=null, ambulanceData=null, activeEmergency=null, activeHospital=null;
let locInterval=null;

/* ── Socket ── */
let socket = null;
try {
    socket = io();
    socket.on('connect', updateConn);
    socket.on('disconnect', updateConn);
    socket.on('assignment_update', d => { if(ambulanceData && d.ambulance_id===ambulanceData.id) checkEmergency(); });
    socket.on('connect_error', updateConn);
} catch(e) {}

/* ── Login ── */
function login() {
    const id = ambulanceIdInp.value.trim();
    if (!id) { toast('Please enter your ambulance ID', 'warning'); return; }
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in…';

    if (id === 'demo') {
        ambulanceData = {id:1, ambulance_id:'DEMO-123', driver_name:'Demo Driver', latitude:14.4644, longitude:75.9218, is_available:true};
        afterLogin(); return;
    }

    fetch('/api/ambulance/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ambulance_id: id})
    })
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(d => {
        if (d.success) { ambulanceData = d.ambulance; afterLogin(); }
        else { toast('Login failed: ' + (d.error||'Unknown error'), 'error'); }
    })
    .catch(e => toast('Cannot connect to server. Is it running?', 'error'))
    .finally(() => {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
    });
}

function afterLogin() {
    loginScreen.style.display = 'none';
    appScreen.style.display   = 'flex';
    initMap();
    startTracking();
    driverInfo.textContent = `${ambulanceData.ambulance_id} — ${ambulanceData.driver_name}`;
    setStatusPill(ambulanceData.is_available);
    checkEmergency();
    setInterval(checkEmergency, 30000);
    updateConn();
}

function logout() {
    if (locInterval)  clearInterval(locInterval);
    if (watchId)      navigator.geolocation.clearWatch(watchId);
    ambulanceData = null; activeEmergency = null;
    appScreen.style.display   = 'none';
    loginScreen.style.display = 'flex';
    if (map) { map.remove(); map = null; }
    ambulanceIdInp.value = '';
}

/* ── Register ── */
function registerAmbulance() {
    const id = newAmbIdInp.value.trim(), name = driverNameInp.value.trim(), phone = driverPhoneInp.value.trim();
    if (!id||!name||!phone) { toast('Please fill in all fields', 'warning'); return; }
    if (!navigator.geolocation) { toast('Geolocation not supported', 'error'); return; }
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Registering…';
    navigator.geolocation.getCurrentPosition(pos => {
        fetch('/api/ambulance/register', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ambulance_id:id, driver_name:name, driver_phone:phone, latitude:pos.coords.latitude, longitude:pos.coords.longitude})
        })
        .then(r=>r.json())
        .then(d => {
            if (d.success) {
                toast('Registered successfully! You can now login.', 'success');
                newAmbIdInp.value = driverNameInp.value = driverPhoneInp.value = '';
                ambulanceIdInp.value = id;
            } else { toast('Error: ' + d.error, 'error'); }
        })
        .catch(() => toast('Error connecting to server.', 'error'))
        .finally(() => { registerBtn.disabled=false; registerBtn.innerHTML='<i class="fa-solid fa-circle-plus"></i> Register Ambulance'; });
    }, e => {
        toast('Location error: '+e.message, 'error');
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fa-solid fa-circle-plus"></i> Register Ambulance';
    }, {enableHighAccuracy:true, timeout:10000});
}

/* ── Map ── */
function initMap() {
    const lat = ambulanceData?.latitude||14.4644, lng = ambulanceData?.longitude||75.9218;
    map = L.map('map').setView([lat,lng],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap contributors', maxZoom:19}).addTo(map);
    const icon = L.divIcon({className:'', iconSize:[24,24], iconAnchor:[12,12],
        html:`<div style="background:#22c55e;width:24px;height:24px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:800;">A</div>`});
    userMarker = L.marker([lat,lng],{icon}).addTo(map).bindPopup(`Ambulance ${ambulanceData.ambulance_id}`);
}

function startTracking() {
    if (!navigator.geolocation) { locationStatus.textContent = 'Geolocation not supported'; return; }
    watchId = navigator.geolocation.watchPosition(pos => {
        currentPos = {latitude:pos.coords.latitude, longitude:pos.coords.longitude};
        locationStatus.textContent = `GPS: ${currentPos.latitude.toFixed(5)}, ${currentPos.longitude.toFixed(5)} (±${Math.round(pos.coords.accuracy)}m)`;
        if (map && userMarker) {
            userMarker.setLatLng([currentPos.latitude, currentPos.longitude]);
        }
        if (activeEmergency && routePoly) updateRoute();
        if (activeHospital) updateHospitalRoute();
    }, e => {
        const m = {[e.PERMISSION_DENIED]:'Location denied.',[e.POSITION_UNAVAILABLE]:'Location unavailable.',[e.TIMEOUT]:'Location timed out.'};
        locationStatus.textContent = m[e.code]||'Location error.';
    }, {enableHighAccuracy:true, timeout:10000, maximumAge:0});
    locInterval = setInterval(sendLocUpdate, 10000);
}

function sendLocUpdate() {
    if (!currentPos||!ambulanceData) return;
    fetch('/api/ambulance/update-location', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ambulance_id:ambulanceData.ambulance_id, ...currentPos})
    }).catch(()=>{});
    if (socket?.connected) socket.emit('ambulance_location_update', {ambulance_id:ambulanceData.ambulance_id, ...currentPos});
}

/* ── Emergency ── */
function checkEmergency() {
    if (!ambulanceData) return;
    fetch(`/api/ambulance/get-assignment/${ambulanceData.ambulance_id}`)
    .then(r=>r.json()).then(d => {
        if (d.success && d.has_assignment) {
            if (!activeEmergency || activeEmergency.id !== d.emergency_call.id) handleNewEmergency(d.emergency_call);
        } else if (activeEmergency) {
            hideEmergency(); activeEmergency=null; setStatusPill(true);
        }
    }).catch(()=>{});
}

function handleNewEmergency(e) {
    activeEmergency = e;
    setStatusPill(false);
    emergencyDet.innerHTML = `
        <p><strong>Location:</strong> ${e.latitude}, ${e.longitude}</p>
        <p><strong>Address:</strong>  ${e.address||'Not available'}</p>
        <p><strong>Caller:</strong>   ${e.caller_phone}</p>
        <p><strong>Time:</strong>     ${fmt(e.call_time)}</p>`;
    emergencyAlert.classList.add('show');
    addDestMarker(e.latitude, e.longitude, e.address);
    if (currentPos) fitBoth(currentPos.latitude, currentPos.longitude, e.latitude, e.longitude);
    playAlert();
    toggleRouteBtn.style.display = 'flex';
    updateRoute();
}

function hideEmergency() {
    emergencyAlert.classList.remove('show');
    if (map && destMarker)  { map.removeLayer(destMarker);  destMarker=null; }
    if (map && routePoly)   { map.removeLayer(routePoly);   routePoly=null; }
    routeInfo.classList.remove('show');
    toggleRouteBtn.style.display = 'none';
}

function addDestMarker(lat, lng, addr) {
    if (!map) return;
    if (destMarker) map.removeLayer(destMarker);
    const icon = L.divIcon({className:'', iconSize:[28,28], iconAnchor:[14,14],
        html:`<div style="background:#ef4444;width:28px;height:28px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(220,38,38,.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:900;">!</div>`});
    destMarker = L.marker([lat,lng],{icon}).addTo(map).bindPopup(`<b>Emergency</b><br>${addr||'Unknown'}`);
}

function fitBoth(la1,lo1,la2,lo2) {
    if (!map) return;
    map.fitBounds(L.latLngBounds([[la1,lo1],[la2,lo2]]), {padding:[50,50]});
}

function updateRoute() {
    if (!activeEmergency||!currentPos||!map) return;
    if (routePoly) map.removeLayer(routePoly);
    routePoly = L.polyline([[currentPos.latitude,currentPos.longitude],[activeEmergency.latitude,activeEmergency.longitude]],
        {color:'#3b82f6', weight:5, opacity:.8, dashArray:'8,10'}).addTo(map);
    const d = calcDist(currentPos.latitude,currentPos.longitude,activeEmergency.latitude,activeEmergency.longitude);
    const eta = Math.round((d/40)*60);
    routeDistance.textContent = d<1 ? `${Math.round(d*1000)} m` : `${d.toFixed(1)} km`;
    routeETA.textContent = eta<1 ? '<1 min' : eta<60 ? `${eta} min` : `${Math.floor(eta/60)}h ${eta%60}m`;
    routeInfo.classList.add('show');
}

function calcDist(la1,lo1,la2,lo2) {
    const R=6371, dL=(la2-la1)*Math.PI/180, dO=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function markArrived() {
    if (!activeEmergency||!ambulanceData) return;
    arrivedBtn.disabled = true;
    fetch('/api/ambulance/mark-arrived', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ambulance_id:ambulanceData.ambulance_id, emergency_call_id:activeEmergency.id})
    }).then(r=>r.json()).then(d => {
        if (d.success) {
            toast('✅ Arrived at scene — finding nearest hospital…', 'success', 5000);
            startHospitalMode();
        } else {
            arrivedBtn.disabled = false;
            toast('Error: '+d.error, 'error');
        }
    }).catch(() => { arrivedBtn.disabled=false; toast('Error connecting.', 'error'); });
}

function startHospitalMode() {
    // Hide emergency overlay, show hospital overlay with loading state
    emergencyAlert.classList.remove('show');
    const overlay = document.getElementById('hospitalOverlay');
    document.getElementById('hospContent').innerHTML =
        '<div class="hosp-searching"><i class="fa-solid fa-spinner fa-spin"></i> Searching for nearest hospital…</div>';
    overlay.classList.add('show');

    if (!currentPos) {
        document.getElementById('hospContent').innerHTML =
            '<div class="hosp-searching"><i class="fa-solid fa-triangle-exclamation"></i> GPS not available — cannot search hospitals</div>';
        return;
    }

    fetch(`/api/ambulance/nearest-hospital?lat=${currentPos.latitude}&lng=${currentPos.longitude}`)
    .then(r => r.json())
    .then(d => {
        if (!d.success) {
            document.getElementById('hospContent').innerHTML =
                `<div class="hosp-searching"><i class="fa-solid fa-triangle-exclamation"></i> ${d.error||'No hospital found'}</div>`;
            return;
        }
        activeHospital = d.hospital;
        const etaMin = Math.round((d.hospital.distance_m / 1000 / 40) * 60);
        const etaStr = etaMin < 1 ? '<1 min' : etaMin < 60 ? `${etaMin} min` : `${Math.floor(etaMin/60)}h ${etaMin%60}m`;
        const phone  = d.hospital.phone ? `<a href="tel:${d.hospital.phone}" style="color:#6ee7b7;text-decoration:none;"><i class="fa-solid fa-phone" style="margin-right:4px;"></i>${d.hospital.phone}</a>` : '';
        document.getElementById('hospContent').innerHTML = `
            <div class="hosp-name">${d.hospital.name}</div>
            <div class="hosp-addr">${d.hospital.address || 'Address not available'}${phone ? ' &nbsp;·&nbsp; '+phone : ''}</div>
            <div class="hosp-stats">
                <div class="hosp-stat"><div class="hosp-stat-val">${d.hospital.distance_str}</div><div class="hosp-stat-lbl">Distance</div></div>
                <div class="hosp-stat"><div class="hosp-stat-val">${etaStr}</div><div class="hosp-stat-lbl">ETA</div></div>
            </div>
            <div class="hosp-btns">
                <button class="hosp-btn nav-h" id="navHospBtn"><i class="fa-brands fa-google"></i>Hospital in Maps</button>
                <button class="hosp-btn nav-v" id="navVictimFromHospBtn"><i class="fa-solid fa-person-falling-burst"></i>Victim in Maps</button>
                <button class="hosp-btn done-h" id="doneHospBtn"><i class="fa-solid fa-flag-checkered"></i>Complete</button>
            </div>`;

        // Map: draw hospital marker + route
        addHospitalMarker(d.hospital.latitude, d.hospital.longitude, d.hospital.name);
        updateHospitalRoute();

        // Bind buttons
        document.getElementById('navHospBtn').addEventListener('click', openHospitalGoogleMaps);
        document.getElementById('navVictimFromHospBtn').addEventListener('click', openVictimGoogleMaps);
        document.getElementById('doneHospBtn').addEventListener('click', markCompleted);

        toast(`🏥 ${d.hospital.name} — ${d.hospital.distance_str} away`, 'success', 7000);
    })
    .catch(() => {
        document.getElementById('hospContent').innerHTML =
            '<div class="hosp-searching"><i class="fa-solid fa-triangle-exclamation"></i> Could not reach server</div>';
    });
}

function addHospitalMarker(lat, lng, name) {
    if (!map) return;
    if (hospitalMarker) map.removeLayer(hospitalMarker);
    const icon = L.divIcon({className:'', iconSize:[30,30], iconAnchor:[15,15],
        html:`<div style="background:#059669;width:30px;height:30px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 10px rgba(5,150,105,.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;"><i class='fa-solid fa-hospital-user' style='font-size:13px;'></i></div>`});
    hospitalMarker = L.marker([lat, lng], {icon}).addTo(map)
        .bindPopup(`<b>🏥 ${name}</b>`).openPopup();
    if (currentPos) fitBoth(currentPos.latitude, currentPos.longitude, lat, lng);
}

function updateHospitalRoute() {
    if (!activeHospital||!currentPos||!map) return;
    if (hospitalPoly) map.removeLayer(hospitalPoly);
    hospitalPoly = L.polyline(
        [[currentPos.latitude, currentPos.longitude], [activeHospital.latitude, activeHospital.longitude]],
        {color:'#10b981', weight:5, opacity:.85, dashArray:'8,10'}
    ).addTo(map);
    routeInfo.classList.add('show');
    const d = calcDist(currentPos.latitude, currentPos.longitude, activeHospital.latitude, activeHospital.longitude);
    const eta = Math.round((d/40)*60);
    routeDistance.textContent = d<1 ? `${Math.round(d*1000)} m` : `${d.toFixed(1)} km`;
    routeETA.textContent = eta<1 ? '<1 min' : eta<60 ? `${eta} min` : `${Math.floor(eta/60)}h ${eta%60}m`;
}

function openVictimGoogleMaps() {
    if (!activeEmergency) return;
    const lat = activeEmergency.latitude, lng = activeEmergency.longitude;
    if (!lat || !lng) { toast('Victim location not available', 'warning'); return; }
    // Opens Google Maps navigation from current position to victim
    const url = currentPos
        ? `https://www.google.com/maps/dir/${currentPos.latitude},${currentPos.longitude}/${lat},${lng}`
        : `https://www.google.com/maps?q=${lat},${lng}`;
    window.open(url, '_blank');
}

function openHospitalGoogleMaps() {
    if (!activeHospital || !currentPos) return;
    // Opens Google Maps navigation from current position to hospital
    window.open(
        `https://www.google.com/maps/dir/${currentPos.latitude},${currentPos.longitude}/${activeHospital.latitude},${activeHospital.longitude}`,
        '_blank'
    );
}

function closeHospitalMode() {
    document.getElementById('hospitalOverlay').classList.remove('show');
    if (map && hospitalMarker) { map.removeLayer(hospitalMarker); hospitalMarker = null; }
    if (map && hospitalPoly)   { map.removeLayer(hospitalPoly);   hospitalPoly = null; }
    activeHospital = null;
}

function markCompleted() {
    if (!activeEmergency) return;
    fetch('/api/ambulance/mark-completed', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({emergency_call_id:activeEmergency.id})
    }).then(r=>r.json()).then(d => {
        if (d.success) {
            hideEmergency(); closeHospitalMode();
            activeEmergency=null; setStatusPill(true);
            arrivedBtn.disabled=false;
            toast('Emergency completed ✅', 'success');
        } else toast('Error: '+d.error, 'error');
    }).catch(() => toast('Error connecting.', 'error'));
}

function toggleRoute() {
    if (routePoly && map.hasLayer(routePoly)) { map.removeLayer(routePoly); routeInfo.classList.remove('show'); }
    else updateRoute();
}

function setStatusPill(available) {
    statusPill.className = 'status-pill ' + (available ? 'available' : 'on-duty');
    statusText.textContent = available ? 'Available' : 'On Duty';
}

function updateConn() {
    const on = navigator.onLine && (socket ? socket.connected : false);
    connStatus.className = 'conn-badge ' + (on ? 'online' : 'offline');
    connStatus.textContent = on ? 'Online' : 'Offline';
}

function playAlert() {
    document.getElementById('notificationSound').play().catch(()=>{});
    toast('EMERGENCY! You have been assigned to a new emergency.', 'error', 8000);
}

function fmt(s) { return s ? new Date(s).toLocaleString() : 'N/A'; }

document.addEventListener('DOMContentLoaded', () => {
    window.addEventListener('online',  updateConn);
    window.addEventListener('offline', updateConn);
    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);
    registerBtn.addEventListener('click', registerAmbulance);
    navigateBtn.addEventListener('click', () => {
        if (!activeEmergency||!currentPos) return;
        window.open(`https://www.openstreetmap.org/directions?engine=graphhopper_car&route=${currentPos.latitude}%2C${currentPos.longitude}%3B${activeEmergency.latitude}%2C${activeEmergency.longitude}`,'_blank');
    });
    arrivedBtn.addEventListener('click',  markArrived);
    completeBtn.addEventListener('click', markCompleted);
    recenterBtn.addEventListener('click', () => {
        if(!map||!currentPos) return;
        map.setView([currentPos.latitude,currentPos.longitude],15);
    });
    toggleRouteBtn.addEventListener('click', toggleRoute);
    updateConn();
});
</script>
</body>
</html>
