services:
  - type: web
    name: lifeline-108-plus
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 simple_app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false          # You fill this in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
